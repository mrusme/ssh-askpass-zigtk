name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - arm-linux-gnueabihf
          - riscv64-linux-gnu
          - powerpc64le-linux-gnu
          - x86-linux-gnu
          - loongarch64-linux-gnu
          - s390x-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        env:
          TARGET: ${{ matrix.target }}
        run: zig build -Dtarget="$TARGET" -Dgtk-stub -Dstrip -Doptimize=ReleaseSafe --prefix dist
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          name="ssh-askpass-zigtk-${GITHUB_REF_NAME}-${TARGET}"
          install -Dm755 dist/bin/ssh-askpass-zigtk "$name/ssh-askpass-zigtk"
          install -Dm644 README.md "$name/README.md"
          tar -czf "$name.tar.gz" "$name"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: '*.tar.gz'
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/*.tar.gz artifacts/SHA256SUMS
